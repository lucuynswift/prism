# 文件⑦ prism-main/.streamlit/secrets.toml
# [改动] 替换 Lemon Squeezy 相关字段为新平台密钥
# 本地测试用，线上在服务器直接设置环境变量

# ★ 服务器地址（不变）
AUTH_BASE_URL = "https://104.248.75.110/api/auth"

# ── 方案A：Paddle ──────────────────────────────────────
# ★ Paddle 控制台 → Developer Tools → Authentication → API Key
PADDLE_API_KEY           = "★粘贴Paddle API Key★"
# ★ Paddle 控制台 → Notifications → Webhook → Secret Key
PADDLE_WEBHOOK_SECRET    = "★粘贴Paddle Webhook Secret★"

# ── 方案B：Ko-fi ───────────────────────────────────────
# ★ 你的 Ko-fi 主页地址
# KOFI_URL                 = "https://ko-fi.com/★你的用户名★"
# ★ Ko-fi 控制台 → API → Token
# KOFI_TOKEN               = "★粘贴Ko-fi Token★"

# ── 方案C：Stripe ──────────────────────────────────────
# ★ Stripe 控制台 → Developers → API keys → Secret key
# STRIPE_SECRET_KEY        = "sk_live_★粘贴★"
# ★ Stripe 控制台 → Webhooks → Signing secret
# STRIPE_WEBHOOK_SECRET    = "whsec_★粘贴★"
# ★ 月订阅 Price ID（Stripe 控制台 → Products → Price ID）
# STRIPE_MONTHLY_PRICE_ID  = "price_★粘贴★"
# ★ 年订阅 Price ID
# STRIPE_YEARLY_PRICE_ID   = "price_★粘贴★"

# ── 方案D：Gumroad ──────────────────────────────────────
# ★ Gumroad → Settings → Advanced → Application ID
GUMROAD_ACCESS_TOKEN=★粘贴★

# ★ 月订阅产品的 Permalink（Gumroad 产品页地址栏最后一段）
# 例如 https://yourname.gumroad.com/l/prism-monthly → 填 prism-monthly
GUMROAD_MONTHLY_PRODUCT=★prism-monthly★

# ★ 年订阅产品的 Permalink
GUMROAD_YEARLY_PRODUCT=★prism-yearly★