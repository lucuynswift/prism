<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Word Interaction Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    html, body {
      font-family: 'Merriweather', Georgia, serif !important;
      background-color: #fcfaf2 !important;
      color: #2c3e50 !important;
      margin: 0 !important;
      padding: 12px !important;
      font-size: 26px !important;
      line-height: 2.2 !important;
      overflow: visible;
    }
    #root { word-spacing: 3px; }
    .word {
      cursor: pointer;
      padding: 2px 6px;
      margin: 0 2px;
      border-radius: 4px;
      display: inline-block;
      transition: all 0.2s ease-in-out;
    }
    .punct-token { display: inline-block; margin: 0; padding: 0; cursor: default; }
    .word:hover { background-color: #e8f4fd !important; color: #1e88e5 !important; }
    #depRelationContainer {
      margin-top: 14px;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2c3e50;
    }
    .dep-relation {
      background: rgba(255,177,66,0.08);
      border-left: 3px solid #ffb142;
      border-radius: 4px;
      padding: 8px 14px;
    }
    .relation-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #b8860b;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .relation-item { padding: 3px 0; font-size: 14px; color: #34495e; }
    .relation-item strong { color: #e67e22; }
    .relation-deprel {
      display: inline-block;
      background: #fff3cd;
      border-radius: 3px;
      padding: 0 5px;
      font-size: 12px;
      color: #856404;
      margin: 0 3px;
    }
  </style>
</head>
<body style="background-color: #fcfaf2 !important; color: #2c3e50 !important;">
  <div id="root" style="font-size: 26px !important; color: #2c3e50 !important;">正在加载...</div>
  <div id="depRelationContainer"></div>

  <!-- 顺序必须固定：先加载库，再加载 index.js -->
  <script src="streamlit-component-lib.js"></script>
  <script src="index.js"></script>
</body>
</html>
